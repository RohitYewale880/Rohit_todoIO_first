
<mat-card>
    <ul class="list-group" *ngIf="todoarray.length > 0; else : nodata">
        <li *ngFor="let todo of todoarray; trackBy : trackbyfun" class="list-group-item d-flex justify-content-between align-items-center">
            <strong><mat-checkbox 
                (change)="onChecked($event, todo)"
                [checked]="todo.isConfirm" color="primary" class="mr-2"></mat-checkbox>{{todo.todoItem}}</strong>
            <div>
                <button 
                (click)="onEdit(todo)"
                mat-mini-fab color="primary" class="mr-3"><mat-icon>edit</mat-icon></button>
                <button
                (click)="onRemove(todo.todoId)"
                mat-mini-fab color="warn"><mat-icon>delete</mat-icon></button>
            </div>
        </li>
    </ul>
    <ng-template #nodata>
        <p class="alert alert-info">No data is added yet!!!</p>
    </ng-template>
</mat-card>
